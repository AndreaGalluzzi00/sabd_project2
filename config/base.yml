experiment:
  name: "base"
  output_dir_host: "Results"
  producer_log_path: "/opt/flink/results/producer.log"

paths:
  raw_dataset_path: "/data/raw/project-2-data"
  prepared_path: "/prepared/flights_prepared.parquet"


  # Path visto dentro il container Flink
  q1_results_path: "/opt/flink/results/q1"
  # Path visto dall'host, usato da scripts/merge_q1.py
  q1_results_host_path: "Results/q1"
  q1_merged_output_host_path: "Results/q1.csv"

kafka:
  bootstrap_servers: "kafka:9092"
  topic: "flights"

preprocessing:
  numeric_missing_policy: "null"  # "null" oppure "zero"

producer:
  acceleration_factor: 57600
  log_interval: 100000
  flush_interval: 5000
  skip_if_topic_has_messages: true

  # Iniezione di out-of-orderness: NON modifica l'event_time, ritarda la consegna.
  #   holdback_probability: frazione di eventi a cui viene ritardato l'invio
  #   holdback_delay:       ritardo MAX di consegna in secondi di event-time
  #                         (= bound di out-of-orderness da confrontare col watermark)
  holdback_probability: 0.3
  holdback_delay: 120.0
  random_seed: 42

  # Distribution used to delay held-back events:
  #   uniform     -> random delay in [0, holdback_delay]
  #   exponential -> many small delays, few large delays
  holdback_distribution: "exponential"

  # Used only when holdback_distribution = "exponential".
  # Average artificial delay in event-time seconds.
  # Recommended: around holdback_delay / 3 -> se non messo lo calcola in automatico
  holdback_mean_seconds: 40.0


  # A fine replay invia un marker con event_time nel futuro a OGNI partizione:
  # spinge il watermark oltre l'ultima finestra → l'ultima finestra viene drenata
  # senza 'flink stop --drain'. Il marker (airline=__EOS__, cancelled/diverted=1)
  # è escluso da tutte le query.
  emit_end_of_stream: true
  retries: 3
  linger_ms: 20
  batch_size: 32768
  max_in_flight_requests_per_connection: 1
  acks: "all"

flink:
  parallelism: 4
  checkpoint_interval_ms: 10000
  consumer_group: "flink-flight-analysis"

  # Intervallo di emissione periodica del watermark (pipeline.auto-watermark-interval).
  # In event-time il "salto cieco" tra due watermark vale interval_ms/1000 * accelerazione:
  # a 57600x, 200ms -> ~11520 s (3.2h) -> schiaccia d e il disordine. Tenere 1ms negli
  # esperimenti di completezza per rendere trascurabile questo gap (G ≈ 58 s).
  auto_watermark_interval_ms: 200

spark:
  consumer_group: "spark-flight-analysis"

q1:
  watermark_delay_seconds: 180

# Visualizzazione real-time su Grafana (Opzionale 1 della specifica).
# Due backend ALTERNATIVI e indipendenti, attivabili uno, l'altro o entrambi:
#   - influx:    Q1 -> topic Kafka -> Telegraf -> InfluxDB   (time-series nativo)
#   - timescale: Q1 -> sink JDBC   -> TimescaleDB            (SQL, connettore Flink nativo)
# Il sink CSV resta SEMPRE attivo: le dashboard sono consumatori paralleli e non
# sostituiscono l'output certificato. Tutti i sink leggono la stessa vista q1_agg,
# quindi CSV/InfluxDB/TimescaleDB non possono divergere.
# Default: entrambi false → pipeline invariata.
dashboard:
  influx:
    enabled: false
    # NB: con enabled=true il topic DEVE esistere (vedi servizio dashboard-init).
    results_topic: "q1_results"
  timescale:
    enabled: false
    # NB: con enabled=true la tabella DEVE esistere (init in dashboard/timescaledb/).
    url: "jdbc:postgresql://timescaledb:5432/sabd"
    table: "q1_results"
    username: "sabd"
    password: "sabd"