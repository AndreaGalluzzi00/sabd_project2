# Telegraf: bridge Kafka -> InfluxDB per la dashboard real-time di Q1.
#
# Consuma le finestre Q1 dal topic 'q1_results' (JSON prodotto dal sink Kafka
# del job Flink) e le scrive come misurazione 'q1' su InfluxDB.
#
# Modello dati su InfluxDB:
#   measurement = "q1"
#   tag         = airline
#   time        = window_start  (event-time della finestra, NON il wall-clock)
#   field       = num_flights, completed, cancelled, diverted, dep_delay_mean,
#                 cancellation_rate, late_departure_rate
#
# window_start è usato come timestamp del punto: in Grafana imposta il time range
# sul periodo del dataset (gen–apr 2025) per vedere le curve costruirsi live.

[agent]
  interval = "5s"
  flush_interval = "5s"
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  omit_hostname = true

[[inputs.kafka_consumer]]
  brokers = ["kafka:9092"]
  topics = ["q1_results"]
  consumer_group = "telegraf-q1"
  # 'oldest' = leggi dall'inizio del topic, così non si perdono le prime finestre
  # prodotte prima che Telegraf si iscriva.
  offset = "oldest"

  data_format = "json"
  name_override = "q1"
  tag_keys = ["airline"]
  json_time_key = "window_start"
  json_time_format = "2006-01-02 15:04:05"
  json_timezone = "UTC"

[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
