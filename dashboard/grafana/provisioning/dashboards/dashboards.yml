# Provider che carica le dashboard JSON da /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: SABD
    orgId: 1
    folder: SABD
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
