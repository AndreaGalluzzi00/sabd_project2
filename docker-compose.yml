# ============================================================
# SABD Project 2 - Real-time Flight Analysis Stack
# Kafka (KRaft) + Apache Flink + Kafka UI
#
# Infrastruttura:
#   docker compose up -d
#
# Moduli manuali:
#   docker compose run --rm kafka-init
#   docker compose run --rm preprocess
#   docker compose run --rm flink-job-q1
#   docker compose run --rm producer
#
# Chiusura pulita del job Q1, dopo che il producer ha finito:
#   docker exec flink-jobmanager flink list -r
#   docker exec flink-jobmanager flink stop --drain -p /opt/flink/savepoints <JOB_ID>
#   python scripts/merge_q1.py
#
# Configurazione applicativa:
#   config/base.yml
#
# Il compose monta ./config dentro i container in /config.
# I servizi Python/Flink leggono CONFIG_PATH=/config/base.yml.
# ============================================================

name: sabd_project2

services:

  # ----------------------------------------------------------
  # Apache Kafka 3.7 in KRaft mode
  # Single-node broker + controller
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk

      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_NUM_PARTITIONS=4
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1

      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

      - KAFKA_LOG_RETENTION_HOURS=48
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # Apache Flink - JobManager
  # ----------------------------------------------------------
  flink-jobmanager:
    build:
      context: .
      dockerfile: flink_jobs/Dockerfile
    hostname: flink-jobmanager
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      CONFIG_PATH: /config/base.yml
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        rest.bind-port: 8081
        metrics.reporters: slf4j
        state.savepoints.dir: file:///opt/flink/savepoints
    volumes:
      - ./config:/config:ro
      - ./Results:/opt/flink/results
      - ./flink-savepoints:/opt/flink/savepoints
      - ./flink-checkpoints:/opt/flink/checkpoints
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # Apache Flink - TaskManager
  # ----------------------------------------------------------
  flink-taskmanager:
    build:
      context: .
      dockerfile: flink_jobs/Dockerfile
    hostname: flink-taskmanager
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      CONFIG_PATH: /config/base.yml
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 2048m
        taskmanager.numberOfTaskSlots: 4
        metrics.reporters: slf4j
        state.savepoints.dir: file:///opt/flink/savepoints
    volumes:
      - ./config:/config:ro
      - ./Results:/opt/flink/results
      - ./flink-savepoints:/opt/flink/savepoints
      - ./flink-checkpoints:/opt/flink/checkpoints
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # Kafka UI - monitoring/debugging
  # http://localhost:8080
  # ----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=sabd-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - sabd-net

  # ==========================================================
  # MODULI MANUALI - profile: manual
  # ==========================================================

  # ----------------------------------------------------------
  # [1] Crea il topic flights su Kafka
  # ----------------------------------------------------------
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    profiles: ["manual"]
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server kafka:9092
        --create
        --if-not-exists
        --topic flights
        --partitions 4
        --replication-factor 1
        --config retention.ms=172800000
        --config max.message.bytes=2097152
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [2] Preprocessing: CSV -> Parquet ordinato per event_time
  # ----------------------------------------------------------
  preprocess:
    build:
      context: .
      dockerfile: preprocessing/Dockerfile
    container_name: preprocess
    profiles: ["manual"]
    environment:
      CONFIG_PATH: /config/base.yml
    volumes:
      - ./config:/config:ro
      - ./data:/data:ro
      - prepared:/prepared
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [3] Flink Q1: sottomette il job PyFlink al cluster
  # ----------------------------------------------------------
  flink-job-q1:
    build:
      context: .
      dockerfile: flink_jobs/Dockerfile
    container_name: flink-job-q1
    profiles: ["manual"]
    depends_on:
      - flink-taskmanager
    environment:
      CONFIG_PATH: /config/base.yml
    command: >
      bash -c "
        echo 'Waiting for Flink JobManager...' &&
        until curl -sf http://flink-jobmanager:8081/overview > /dev/null; do sleep 2; done &&
        echo 'Preparing Q1 output directory...' &&
        python -c \"from pathlib import Path; from common.config import load_config; p = Path(load_config()['paths']['q1_results_path']); p.mkdir(parents=True, exist_ok=True); print(f'Q1 output directory ready: {p}')\" &&
        echo 'Submitting Q1 job...' &&
        flink run -d -m flink-jobmanager:8081 -py /opt/flink/jobs/q1/job.py
      "
    volumes:
      - ./config:/config:ro
      - ./Results:/opt/flink/results
      - ./flink-savepoints:/opt/flink/savepoints
      - ./flink-checkpoints:/opt/flink/checkpoints
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [4] Producer: replay eventi su Kafka
  # ----------------------------------------------------------
  producer:
    build:
      context: .
      dockerfile: production/Dockerfile
    container_name: producer
    profiles: ["manual"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      CONFIG_PATH: /config/base.yml
    volumes:
      - ./config:/config:ro
      - prepared:/prepared:ro
      - ./Results:/opt/flink/results
    networks:
      - sabd-net
    restart: "no"

volumes:
  kafka_data:
  prepared:

networks:
  sabd-net:
    driver: bridge