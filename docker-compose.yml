# ============================================================
# SABD Project 2 - Real-time Flight Analysis Stack
# Kafka (KRaft) + Apache Flink + Kafka UI
#
# Infrastruttura:
#   docker compose up -d
#
# Moduli manuali:
#   docker compose run --rm kafka-init
#   docker compose run --rm preprocess
#   docker compose run --rm flink-job-q1
#   docker compose run --rm flink-job-q1-ds
#   docker compose run --rm flink-job-q2
#   docker compose run --rm producer
#
# Chiusura pulita dei job (dopo che il producer ha finito):
#   docker exec flink-jobmanager flink list -r
#   docker exec flink-jobmanager flink stop --drain -p /opt/flink/savepoints <JOB_ID_Q1>
#   docker exec flink-jobmanager flink stop --drain -p /opt/flink/savepoints <JOB_ID_Q2>
#   python scripts/merge_q1.py
#   python scripts/merge_q2.py
#
# Configurazione applicativa:
#   config/base.yml
#
# Il compose monta ./config dentro i container in /config.
# I servizi Python/Flink leggono CONFIG_PATH=/config/base.yml.
# ============================================================

name: sabd_project2

services:

  # ----------------------------------------------------------
  # Apache Kafka 3.7 in KRaft mode
  # Single-node broker + controller
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk

      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_NUM_PARTITIONS=4
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1

      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

      - KAFKA_LOG_RETENTION_HOURS=48
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # Confluent Schema Registry
  # Manages Avro schemas; Flink avro-confluent format and NiFi
  # AvroRecordSetWriter both resolve schemas from here.
  # ----------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8081"
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # Schema Init: registers flight.avsc in Schema Registry
  # Runs once at startup (restart: no).
  # ----------------------------------------------------------
  schema-init:
    image: python:3.11-slim
    container_name: schema-init
    depends_on:
      schema-registry:
        condition: service_healthy
    command: >
      bash -c "
        pip install --quiet requests &&
        python -c \"import requests,sys; s=open('/schema/flight.avsc').read(); r=requests.post('http://schema-registry:8081/subjects/flights-value/versions',json={'schema':s},headers={'Content-Type':'application/vnd.schemaregistry.v1+json'}); print('Schema registered (or already exists). ID:',r.json().get('id','N/A')) if r.status_code in (200,409) else (print('ERROR:',r.status_code,r.text) or sys.exit(1))\"
      "
    volumes:
      - ./schema:/schema:ro
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # Apache NiFi 1.16.3
  # Receives CSV batches from the producer via HTTP (port 9876)
  # and publishes Avro messages to Kafka.
  # UI available at http://localhost:8180/nifi
  # ----------------------------------------------------------
  nifi:
    image: apache/nifi:1.16.3
    hostname: nifi
    container_name: nifi
    depends_on:
      schema-registry:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8180:8080"   # NiFi UI (8080 inside container)
      - "9876:9876"   # ListenHTTP ingest endpoint
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - NIFI_WEB_HTTP_HOST=0.0.0.0
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminpassword
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/nifi-api/flow/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # NiFi Init: configures the NiFi flow via REST API
  # Runs once after NiFi is healthy (restart: no).
  # ----------------------------------------------------------
  nifi-init:
    build:
      context: ./nifi
      dockerfile: Dockerfile
    container_name: nifi-init
    depends_on:
      nifi:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      - NIFI_BASE_URL=http://nifi:8080/nifi-api
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=flights
      - NIFI_LISTEN_PORT=9876
      - NIFI_LISTEN_PATH=/flights
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # Apache Flink - JobManager
  # ----------------------------------------------------------
  flink-jobmanager:
    build:
      context: .
      dockerfile: flink_jobs/Dockerfile
    platform: linux/amd64
    hostname: flink-jobmanager
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      CONFIG_PATH: /config/base.yml
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        rest.bind-port: 8081
        metrics.reporters: slf4j
        state.savepoints.dir: file:///opt/flink/savepoints
    volumes:
      - ./config:/config:ro
      - ./Results:/opt/flink/results
      - ./flink-savepoints:/opt/flink/savepoints
      - ./flink-checkpoints:/opt/flink/checkpoints
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # Apache Flink - TaskManager
  # ----------------------------------------------------------
  flink-taskmanager:
    build:
      context: .
      dockerfile: flink_jobs/Dockerfile
    platform: linux/amd64
    hostname: flink-taskmanager
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      CONFIG_PATH: /config/base.yml
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 2048m
        taskmanager.numberOfTaskSlots: 4
        metrics.reporters: slf4j
        state.savepoints.dir: file:///opt/flink/savepoints
    volumes:
      - ./config:/config:ro
      - ./Results:/opt/flink/results
      - ./flink-savepoints:/opt/flink/savepoints
      - ./flink-checkpoints:/opt/flink/checkpoints
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # Kafka UI - monitoring/debugging
  # http://localhost:8080
  # ----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=sabd-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - sabd-net

  # ==========================================================
  # MODULI MANUALI - profile: manual
  # ==========================================================

  # ----------------------------------------------------------
  # [1] Crea il topic flights su Kafka
  # ----------------------------------------------------------
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    profiles: ["manual"]
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server kafka:9092
        --create
        --if-not-exists
        --topic flights
        --partitions 4
        --replication-factor 1
        --config retention.ms=172800000
        --config max.message.bytes=2097152
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [2] Preprocessing: CSV -> CSV ordinato per event_time
  # ----------------------------------------------------------
  preprocess:
    build:
      context: .
      dockerfile: preprocessing/Dockerfile
    container_name: preprocess
    profiles: ["manual"]
    environment:
      CONFIG_PATH: /config/base.yml
    volumes:
      - ./config:/config:ro
      - ./data:/data:ro
      - prepared:/prepared
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [3] Flink Q1: sottomette il job PyFlink al cluster
  # ----------------------------------------------------------
  flink-job-q1:
    build:
      context: .
      dockerfile: flink_jobs/Dockerfile
    platform: linux/amd64
    container_name: flink-job-q1
    profiles: ["manual"]
    depends_on:
      - flink-taskmanager
    environment:
      CONFIG_PATH: /config/base.yml
    command: >
      bash -c "
        echo 'Waiting for Flink JobManager...' &&
        until curl -sf http://flink-jobmanager:8081/overview > /dev/null; do sleep 2; done &&
        echo 'Preparing Q1 output directory...' &&
        python -c \"from pathlib import Path; from common.config import load_config; p = Path(load_config()['paths']['q1_results_path']); p.mkdir(parents=True, exist_ok=True); print(f'Q1 output directory ready: {p}')\" &&
        echo 'Submitting Q1 job...' &&
        flink run -d -m flink-jobmanager:8081 -py /opt/flink/jobs/q1/job.py
      "
    volumes:
      - ./config:/config:ro
      - ./Results:/opt/flink/results
      - ./flink-savepoints:/opt/flink/savepoints
      - ./flink-checkpoints:/opt/flink/checkpoints
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [3b] Flink Q1 DataStream: reimplementazione DataStream API
  # Produce gli stessi risultati di flink-job-q1 in q1_ds/
  # per confronto architetturale Table API vs DataStream API.
  # ----------------------------------------------------------
  flink-job-q1-ds:
    build:
      context: .
      dockerfile: flink_jobs/Dockerfile
    platform: linux/amd64
    container_name: flink-job-q1-ds
    profiles: ["manual"]
    depends_on:
      - flink-taskmanager
    environment:
      CONFIG_PATH: /config/base.yml
    command: >
      bash -c "
        echo 'Waiting for Flink JobManager...' &&
        until curl -sf http://flink-jobmanager:8081/overview > /dev/null; do sleep 2; done &&
        echo 'Preparing Q1-DS output directory...' &&
        python -c \"from pathlib import Path; from common.config import load_config; p = Path(load_config()['paths']['q1_ds_results_path']); p.mkdir(parents=True, exist_ok=True); print(f'Q1-DS output directory ready: {p}')\" &&
        echo 'Submitting Q1-DS job (DataStream API)...' &&
        flink run -d -m flink-jobmanager:8081 -py /opt/flink/jobs/q1/job_datastream.py
      "
    volumes:
      - ./config:/config:ro
      - ./Results:/opt/flink/results
      - ./flink-savepoints:/opt/flink/savepoints
      - ./flink-checkpoints:/opt/flink/checkpoints
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [3c] Flink Q2: sottomette il job PyFlink al cluster
  # ----------------------------------------------------------
  flink-job-q2:
    build:
      context: .
      dockerfile: flink_jobs/Dockerfile
    platform: linux/amd64
    container_name: flink-job-q2
    profiles: ["manual"]
    depends_on:
      - flink-taskmanager
    environment:
      CONFIG_PATH: /config/base.yml
    command: >
      bash -c "
        echo 'Waiting for Flink JobManager...' &&
        until curl -sf http://flink-jobmanager:8081/overview > /dev/null; do sleep 2; done &&
        echo 'Preparing Q2 output directories...' &&
        python -c \"from pathlib import Path; from common.config import load_config; cfg=load_config()['paths']; [Path(cfg[k]).mkdir(parents=True,exist_ok=True) or print(f'Ready: {Path(cfg[k])}') for k in ['q2_results_path_1h','q2_results_path_6h','q2_results_path_global']]\" &&
        echo 'Submitting Q2 job...' &&
        flink run -d -m flink-jobmanager:8081 -py /opt/flink/jobs/q2/job.py
      "
    volumes:
      - ./config:/config:ro
      - ./Results:/opt/flink/results
      - ./flink-savepoints:/opt/flink/savepoints
      - ./flink-checkpoints:/opt/flink/checkpoints
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [4] Producer: replay eventi su Kafka via NiFi
  # Sends CSV batches to NiFi ListenHTTP; NiFi converts to Avro
  # and publishes to Kafka. EOS markers go directly to Kafka
  # (via kafka-python) in Confluent Avro format.
  # ----------------------------------------------------------
  producer:
    build:
      context: .
      dockerfile: production/Dockerfile
    container_name: producer
    profiles: ["manual"]
    depends_on:
      kafka:
        condition: service_healthy
      nifi-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      CONFIG_PATH: /config/base.yml
    volumes:
      - ./config:/config:ro
      - prepared:/prepared:ro
      - ./Results:/opt/flink/results
    networks:
      - sabd-net
    restart: "no"

  # ==========================================================
  # DASHBOARD REAL-TIME (Opzionale 1)
  # Due backend ALTERNATIVI, attivabili separatamente o insieme:
  #
  #   profile dashboard-influx     (time-series nativo)
  #     Flink Q1 --(topic q1_results)--> Telegraf --> InfluxDB --> Grafana
  #
  #   profile dashboard-timescale  (SQL, sink JDBC nativo di Flink)
  #     Flink Q1 --(JDBC)--> TimescaleDB --> Grafana
  #
  # Grafana è condiviso (in entrambi i profili) e provisiona entrambe le
  # dashboard/datasource: confronto fianco a fianco per la presentazione.
  #
  #   docker compose --profile dashboard-influx up -d
  #   docker compose --profile dashboard-timescale up -d
  #   docker compose --profile dashboard-influx --profile dashboard-timescale up -d
  #
  # Grafana: http://localhost:3000 (admin/admin) · InfluxDB: :8086 (admin/admin12345)
  # TimescaleDB: :5432 (sabd/sabd). Credenziali SOLO per uso locale/demo.
  # ==========================================================

  # ----------------------------------------------------------
  # [D0] Crea il topic dei risultati Q1 consumato da Telegraf
  # ----------------------------------------------------------
  dashboard-init:
    image: apache/kafka:3.7.0
    container_name: sabd2-dashboard-init
    profiles: ["dashboard-influx"]
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server kafka:9092
        --create
        --if-not-exists
        --topic q1_results
        --partitions 4
        --replication-factor 1
    networks:
      - sabd-net
    restart: "no"

  # ----------------------------------------------------------
  # [D1] InfluxDB 2.x - time-series store delle metriche di query
  # Retention infinita (0s): l'event-time del replay è nel 2025,
  # una retention finita scarterebbe i punti perché già "vecchi".
  # ----------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: sabd2-influxdb
    profiles: ["dashboard-influx"]
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin12345
      - DOCKER_INFLUXDB_INIT_ORG=sabd
      - DOCKER_INFLUXDB_INIT_BUCKET=flights
      - DOCKER_INFLUXDB_INIT_RETENTION=0s
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=sabd-dev-token-please-change
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # [D2] Telegraf - consuma q1_results da Kafka e scrive su InfluxDB
  # ----------------------------------------------------------
  telegraf:
    image: telegraf:1.30
    container_name: sabd2-telegraf
    profiles: ["dashboard-influx"]
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=sabd-dev-token-please-change
      - INFLUX_ORG=sabd
      - INFLUX_BUCKET=flights
    volumes:
      - ./dashboard/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - sabd-net
    restart: unless-stopped

  # ----------------------------------------------------------
  # [D3] TimescaleDB - store SQL (Postgres + estensione time-series).
  # L'init in /docker-entrypoint-initdb.d crea tabella + hypertable al
  # primo avvio (il sink JDBC di Flink NON crea tabelle).
  # ----------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    container_name: sabd2-timescaledb
    profiles: ["dashboard-timescale"]
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sabd
      - POSTGRES_PASSWORD=sabd
      - POSTGRES_DB=sabd
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./dashboard/timescaledb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sabd -d sabd"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - sabd-net

  # ----------------------------------------------------------
  # [D4] Grafana - condiviso da entrambi i profili.
  # Provisiona i due datasource (InfluxDB/Flux + TimescaleDB/SQL) e le due
  # dashboard. Niente depends_on sui DB: un datasource non raggiungibile dà
  # solo errore sui pannelli relativi, non blocca l'avvio.
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: sabd2-grafana
    profiles: ["dashboard-influx", "dashboard-timescale"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboard/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboard/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - sabd-net

volumes:
  kafka_data:
  prepared:
  influxdb_data:
  grafana_data:
  timescaledb_data:

networks:
  sabd-net:
    driver: bridge
