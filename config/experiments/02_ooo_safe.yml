extends: "../base.yml"

experiment:
  name: "02_ooo_safe"
  output_dir_host: "Results/experiments"
  producer_log_path: "/opt/flink/results/experiments/02_ooo_safe/producer.log"

paths:
  q1_results_path: "/opt/flink/results/experiments/02_ooo_safe/part_files"
  q1_results_host_path: "Results/experiments/02_ooo_safe/part_files"
  q1_merged_output_host_path: "Results/experiments/02_ooo_safe/q1.csv"

producer:
  holdback_probability: 0.3
  holdback_delay: 120.0
  holdback_distribution: "exponential"
  holdback_mean_seconds: 40.0

q1:
  watermark_delay_seconds: 180